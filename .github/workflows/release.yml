name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v0.1.0)'
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always

jobs:
  build-release:
    name: Build ${{ matrix.artifact }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: phazeai-linux-x86_64
            ext: tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: phazeai-macos-aarch64
            ext: tar.gz
          - os: macos-13
            target: x86_64-apple-darwin
            artifact: phazeai-macos-x86_64
            ext: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: phazeai-windows-x86_64
            ext: zip

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-release-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-release-${{ matrix.target }}-

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libxkbcommon-dev libssl-dev \
            libwayland-dev libxkbcommon-x11-dev \
            libudev-dev libinput-dev libdbus-1-dev python3

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: brew install python3 || true

      - name: Run tests (Linux only — headless)
        if: runner.os == 'Linux'
        run: cargo test -p phazeai-core -p phazeai-cli

      - name: Build release binaries
        run: cargo build --release --target ${{ matrix.target }} -p phazeai-ui -p phazeai-cli

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/phazeai-ui dist/
          cp target/${{ matrix.target }}/release/phazeai dist/
          chmod +x dist/phazeai-ui dist/phazeai
          cp -r assets/branding dist/ 2>/dev/null || true
          cp README.md dist/ 2>/dev/null || true
          tar czf ${{ matrix.artifact }}.${{ matrix.ext }} -C dist .

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item "target/${{ matrix.target }}/release/phazeai-ui.exe" dist/
          Copy-Item "target/${{ matrix.target }}/release/phazeai.exe" dist/
          Compress-Archive -Path dist/* -DestinationPath "${{ matrix.artifact }}.${{ matrix.ext }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.${{ matrix.ext }}

  create-release:
    name: Create GitHub Release
    needs: build-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version || github.ref_name }}
          name: PhazeAI IDE ${{ inputs.version || github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          body: |
            ## PhazeAI IDE

            AI-native, local-first IDE built in Rust with Floem GPU-accelerated UI.

            ### Downloads
            | Platform | Binary |
            |----------|--------|
            | Linux x86_64 | `phazeai-linux-x86_64.tar.gz` |
            | macOS ARM (M1/M2/M3) | `phazeai-macos-aarch64.tar.gz` |
            | macOS Intel | `phazeai-macos-x86_64.tar.gz` |
            | Windows x86_64 | `phazeai-windows-x86_64.zip` |

            ### Quick Start
            ```bash
            tar xzf phazeai-*.tar.gz
            ./phazeai-ui   # GPU-accelerated desktop IDE
            ./phazeai      # Terminal CLI
            ```
          files: artifacts/**/*
