name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ─────────────────────────────────────────────
  # BUILD RELEASE BINARIES (matrix)
  # ─────────────────────────────────────────────
  build:
    name: Build / ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            cli_bin: phazeai
            ui_bin: phazeai-ui
            archive_ext: tar.gz

          - target: x86_64-apple-darwin
            os: macos-latest
            cli_bin: phazeai
            ui_bin: phazeai-ui
            archive_ext: tar.gz

          - target: aarch64-apple-darwin
            os: macos-latest
            cli_bin: phazeai
            ui_bin: phazeai-ui
            archive_ext: tar.gz

          - target: x86_64-pc-windows-msvc
            os: windows-latest
            cli_bin: phazeai.exe
            ui_bin: phazeai-ui.exe
            archive_ext: zip

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (channel from rust-toolchain.toml)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: '1.93'
          targets: ${{ matrix.target }}

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-release-
            ${{ runner.os }}-${{ matrix.target }}-

      # ── Linux system deps (matches ci.yml exactly) ──
      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libxkbcommon-dev libwayland-dev libxcb-xfixes0-dev \
            libxcb-shape0-dev libxcb-render0-dev libxkbcommon-x11-dev \
            libudev-dev libinput-dev libdbus-1-dev python3

      # ── Build ──────────────────────────────────────
      - name: Build release binaries
        run: cargo build --release -p phazeai-cli -p phazeai-ui --target ${{ matrix.target }}

      # ── Extract version from tag ───────────────────
      - name: Extract version
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      # ── Package: Linux / macOS (tar.gz) ───────────
      - name: Package binaries (tar.gz)
        if: matrix.archive_ext == 'tar.gz'
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          TARGET="${{ matrix.target }}"
          BIN_DIR="target/$TARGET/release"

          mkdir -p dist

          # phazeai-cli
          CLI_NAME="phazeai-cli-${VERSION}-${TARGET}"
          mkdir -p "dist/${CLI_NAME}"
          cp "${BIN_DIR}/${{ matrix.cli_bin }}" "dist/${CLI_NAME}/"
          tar -C dist -czf "dist/${CLI_NAME}.tar.gz" "${CLI_NAME}"
          rm -rf "dist/${CLI_NAME}"

          # phazeai-ui (IDE)
          IDE_NAME="phazeai-ide-${VERSION}-${TARGET}"
          mkdir -p "dist/${IDE_NAME}"
          cp "${BIN_DIR}/${{ matrix.ui_bin }}" "dist/${IDE_NAME}/"
          tar -C dist -czf "dist/${IDE_NAME}.tar.gz" "${IDE_NAME}"
          rm -rf "dist/${IDE_NAME}"

      # ── Package: Windows (zip) ────────────────────
      - name: Package binaries (zip)
        if: matrix.archive_ext == 'zip'
        shell: pwsh
        run: |
          $VERSION = "${{ steps.version.outputs.VERSION }}"
          $TARGET  = "${{ matrix.target }}"
          $BIN_DIR = "target\$TARGET\release"

          New-Item -ItemType Directory -Force dist | Out-Null

          # phazeai-cli
          $CLI_NAME = "phazeai-cli-${VERSION}-${TARGET}"
          New-Item -ItemType Directory -Force "dist\${CLI_NAME}" | Out-Null
          Copy-Item "${BIN_DIR}\${{ matrix.cli_bin }}" "dist\${CLI_NAME}\"
          Compress-Archive -Path "dist\${CLI_NAME}" -DestinationPath "dist\${CLI_NAME}.zip" -Force
          Remove-Item -Recurse -Force "dist\${CLI_NAME}"

          # phazeai-ui (IDE)
          $IDE_NAME = "phazeai-ide-${VERSION}-${TARGET}"
          New-Item -ItemType Directory -Force "dist\${IDE_NAME}" | Out-Null
          Copy-Item "${BIN_DIR}\${{ matrix.ui_bin }}" "dist\${IDE_NAME}\"
          Compress-Archive -Path "dist\${IDE_NAME}" -DestinationPath "dist\${IDE_NAME}.zip" -Force
          Remove-Item -Recurse -Force "dist\${IDE_NAME}"

      # ── Upload artifacts for release job ──────────
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.target }}
          path: dist/
          if-no-files-found: error

  # ─────────────────────────────────────────────
  # CREATE GITHUB RELEASE
  # ─────────────────────────────────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: List release assets
        run: find dist -type f | sort

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: PhazeAI ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: dist/**
