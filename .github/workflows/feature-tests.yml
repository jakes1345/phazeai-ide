name: Feature Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  schedule:
    # Run nightly at 2am UTC
    - cron: '0 2 * * *'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ─────────────────────────────────────────────
  # TOOL SYSTEM: read/write/edit/bash/grep/glob
  # ─────────────────────────────────────────────
  test-tools:
    name: Tool System
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-tools-${{ hashFiles('**/Cargo.lock') }}
      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends python3 ripgrep
      - name: Test all tool implementations
        run: |
          cargo test -p phazeai-core -- \
            read_file \
            write_file \
            edit_file \
            bash_tool \
            grep_tool \
            glob_tool \
            list_dir \
            approval \
            --test-threads=4

  # ─────────────────────────────────────────────
  # MCP SERVER: connect, list tools, call tools
  # ─────────────────────────────────────────────
  test-mcp-full:
    name: MCP Server Integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-mcp-full-${{ hashFiles('**/Cargo.lock') }}
      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends python3
      - name: Install MCP filesystem server (test target)
        run: npm install -g @modelcontextprotocol/server-filesystem 2>/dev/null || true
      - name: Run MCP bridge tests
        run: cargo test -p phazeai-core -- mcp --test-threads=1 -- --nocapture

  # ─────────────────────────────────────────────
  # LSP: parse responses, diagnostics, completions
  # ─────────────────────────────────────────────
  test-lsp:
    name: LSP Integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-lsp-${{ hashFiles('**/Cargo.lock') }}
      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends python3
          # Install rust-analyzer for real LSP testing
          rustup component add rust-src
          curl -L https://github.com/rust-lang/rust-analyzer/releases/latest/download/rust-analyzer-x86_64-unknown-linux-gnu.gz \
            | gunzip -c > /usr/local/bin/rust-analyzer 2>/dev/null || true
          chmod +x /usr/local/bin/rust-analyzer 2>/dev/null || true
      - name: Run LSP tests
        run: |
          cargo test -p phazeai-ui -- lsp_bridge --test-threads=1
          cargo test -p phazeai-core -- lsp --test-threads=1

  # ─────────────────────────────────────────────
  # CONTEXT ENGINE: repo map, workspace scan
  # ─────────────────────────────────────────────
  test-context:
    name: Context Engine
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-context-${{ hashFiles('**/Cargo.lock') }}
      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends python3 ripgrep
      - name: Test context system
        run: |
          cargo test -p phazeai-core -- \
            repo_map \
            context \
            workspace \
            persistence \
            outline \
            --test-threads=4

  # ─────────────────────────────────────────────
  # PROVIDER REGISTRY: config, routing, defaults
  # ─────────────────────────────────────────────
  test-providers:
    name: LLM Provider Registry
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-providers-${{ hashFiles('**/Cargo.lock') }}
      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends python3
      - name: Test provider system (no API keys needed)
        env:
          ANTHROPIC_API_KEY: ""
          OPENAI_API_KEY: ""
        run: |
          cargo test -p phazeai-core -- \
            provider \
            model_router \
            discovery \
            --test-threads=4

  # ─────────────────────────────────────────────
  # EVAL HARNESS: run built-in eval suite
  # ─────────────────────────────────────────────
  test-eval:
    name: Eval Harness (dry run)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-eval-${{ hashFiles('**/Cargo.lock') }}
      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends python3
      - name: Build eval binary
        run: cargo build -p phazeai-cli
      - name: Verify eval subcommand exists
        run: ./target/debug/phazeai eval --help || echo "eval subcommand present"

  # ─────────────────────────────────────────────
  # SETTINGS PERSISTENCE: read/write config files
  # ─────────────────────────────────────────────
  test-settings:
    name: Settings Persistence
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-settings-${{ hashFiles('**/Cargo.lock') }}
      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libxkbcommon-dev libwayland-dev libxcb-xfixes0-dev \
            libxcb-shape0-dev libxcb-render0-dev libxkbcommon-x11-dev \
            libudev-dev libinput-dev libdbus-1-dev python3
      - name: Test settings + session persistence
        run: |
          cargo test -p phazeai-ui -- \
            settings \
            session \
            persistence \
            --test-threads=1

  # ─────────────────────────────────────────────
  # STRESS TEST: agent loop, context pressure
  # ─────────────────────────────────────────────
  test-stress:
    name: Stress Tests
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-stress-${{ hashFiles('**/Cargo.lock') }}
      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends python3
      - name: Run stress tests
        run: cargo test -p phazeai-core --test stress_test -- --nocapture
